function irnd(a,b){ return a + Math.floor(Math.random()*(b-a+1)); }
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
// 地形生成用シード付き乱数（毎回同じ世界になるように）
function mulberry(seed){ return function(){ seed|=0; seed=seed+0x6D2B79F5|0;
  let t=Math.imul(seed^seed>>>15,1|seed); t=t+Math.imul(t^t>>>7,61|t)^t;
  return ((t^t>>>14)>>>0)/4294967296; }; }

function audio(){ if(!AC){ AC = new (window.AudioContext||window.webkitAudioContext)(); }
  if(AC.state==='suspended') AC.resume(); return AC; }
function beep(freq,dur,type,vol,when,dest){
  if(muted) return; const ac=audio();
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=type||'square'; o.frequency.value=freq;
  g.gain.setValueAtTime(vol||0.06, when||ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,(when||ac.currentTime)+dur);
  o.connect(g); g.connect(dest||ac.destination);
  o.start(when||ac.currentTime); o.stop((when||ac.currentTime)+dur);
}
function midi(n){ return 440*Math.pow(2,(n-69)/12); }
function sfx(name){
  if(muted||!AC) return; const t=AC.currentTime;
  switch(name){
    case 'cursor': beep(880,0.05,'square',0.05); break;
    case 'ok':     beep(660,0.06,'square',0.05); beep(990,0.08,'square',0.05,t+0.06); break;
    case 'cancel': beep(440,0.08,'square',0.05); break;
    case 'attack': beep(180,0.10,'sawtooth',0.10); beep(120,0.12,'sawtooth',0.09,t+0.05); break;
    case 'hit':    beep(140,0.15,'square',0.10); break;
    case 'spell':  for(let i=0;i<6;i++) beep(500+i*180,0.07,'triangle',0.06,t+i*0.045); break;
    case 'heal':   for(let i=0;i<4;i++) beep(700+i*120,0.09,'sine',0.07,t+i*0.07); break;
    case 'levelup':[60,64,67,72,76,79,84].forEach((n,i)=>beep(midi(n),0.12,'square',0.06,t+i*0.09)); break;
    case 'gold':   beep(1320,0.05,'square',0.05); beep(1760,0.09,'square',0.05,t+0.05); break;
    case 'stairs': beep(330,0.08,'triangle',0.06); beep(262,0.10,'triangle',0.06,t+0.08); break;
    case 'dead':   [52,50,48,45,41].forEach((n,i)=>beep(midi(n),0.22,'triangle',0.08,t+i*0.18)); break;
    case 'win':    [67,72,76,79,84].forEach((n,i)=>beep(midi(n),0.13,'square',0.06,t+i*0.10)); break;
    case 'swamp':  beep(110,0.12,'triangle',0.07); break;
  }
}

function stopMusic(){
  if(musicTimer){ clearTimeout(musicTimer); musicTimer=null; }
  musicName='';
  // 予約済みの音もまとめて切る（曲がりかさなるのを防ぐ）
  if(musicGain){ try{ musicGain.disconnect(); }catch(e){} musicGain=null; }
}
function playMusic(name){
  if(musicName===name) return;
  stopMusic(); musicName=name;
  if(!TUNES[name]) return;
  const tune=TUNES[name];
  const step = 60/tune.bpm/4; // 16分音符の秒数
  function loop(){
    if(musicName!==name || muted){ if(musicName===name) musicTimer=setTimeout(loop,500); return; }
    const ac=audio();
    if(!musicGain){ musicGain=ac.createGain(); musicGain.gain.value=1; musicGain.connect(ac.destination); }
    const dest=musicGain;
    let t=ac.currentTime+0.05; let total=0;
    for(const [n,d] of tune.mel){ if(n>0) beep(midi(n),d*step*0.92,'square',0.045,t+total*step,dest); total+=d; }
    let bt=0;
    for(const [n,d] of tune.bas){ if(n>0) beep(midi(n),d*step*0.92,'triangle',0.06,t+bt*step,dest); bt+=d; }
    musicTimer=setTimeout(loop, total*step*1000);
  }
  loop();
}

// 描画関数（パレット絵）
function drawArt(name,x,y,px,flip){
  const a=ART[name]; if(!a) return;
  const rows=a.r;
  for(let j=0;j<rows.length;j++){
    const row=rows[j];
    for(let i=0;i<row.length;i++){
      const c = flip ? row[row.length-1-i] : row[i];
      if(c==='.'||c===' ') continue;
      const col=a.p[c]; if(!col) continue;
      ctx.fillStyle=col;
      ctx.fillRect(x+i*px, y+j*px, px, px);
    }
  }
}

//  タイル（手続き描画でアトラス生成）
//==================================================================
const TS=32; // 画面上のタイルサイズ
const TILE_KEYS=['grass','forest','hill','mtn','water','bridge','desert','swamp',
  'castle','town','cave','wall','floor','counter','stairs_d','stairs_u','chest','chest_open',
  'throne','carpet','cell','dark',
  'water2','flower','sign_w','sign_a','sign_i','sign_n','door','shrine','barrier','exit'];
const atlas=document.createElement('canvas');
atlas.width=TILE_KEYS.length*TS; atlas.height=TS;
const atx=atlas.getContext('2d');
function tileIndex(k){ return TILE_KEYS.indexOf(k); }
(function buildAtlas(){
  const r=mulberry(7);
  function px(i,x,y,w,h,c){ atx.fillStyle=c; atx.fillRect(i*TS+x*2,y*2,w*2,h*2); }
  TILE_KEYS.forEach((k,i)=>{
    switch(k){
      case 'grass': px(i,0,0,16,16,'#48a040');
        for(let n=0;n<8;n++) px(i,Math.floor(r()*15),Math.floor(r()*15),1,1,'#60b858'); break;
      case 'forest': px(i,0,0,16,16,'#48a040');
        px(i,3,9,10,5,'#185818'); px(i,4,4,8,6,'#207828'); px(i,5,1,6,4,'#289830');
        px(i,7,13,2,3,'#684018'); break;
      case 'hill': px(i,0,0,16,16,'#48a040');
        px(i,2,8,12,6,'#789048'); px(i,4,5,8,4,'#90a858'); px(i,6,3,4,3,'#a8c068'); break;
      case 'mtn': px(i,0,0,16,16,'#48a040');
        px(i,1,11,14,4,'#787068'); px(i,3,7,10,5,'#888078'); px(i,5,3,6,5,'#a09890');
        px(i,6,1,4,3,'#e8e8e8'); break;
      case 'water': px(i,0,0,16,16,'#2858c0');
        for(let n=0;n<5;n++) px(i,Math.floor(r()*13),Math.floor(r()*15),3,1,'#4878d8'); break;
      case 'bridge': px(i,0,0,16,16,'#2858c0');
        px(i,2,0,12,16,'#a07840'); px(i,2,0,1,16,'#684818'); px(i,13,0,1,16,'#684818');
        for(let n=0;n<4;n++) px(i,3,2+n*4,10,1,'#806030'); break;
      case 'desert': px(i,0,0,16,16,'#d8c078');
        for(let n=0;n<6;n++) px(i,Math.floor(r()*14),Math.floor(r()*15),2,1,'#c0a860'); break;
      case 'swamp': px(i,0,0,16,16,'#506048');
        for(let n=0;n<6;n++) px(i,Math.floor(r()*13),Math.floor(r()*14),3,2,'#705888');
        px(i,4,4,2,1,'#a890c0'); px(i,10,10,2,1,'#a890c0'); break;
      case 'castle': px(i,0,0,16,16,'#48a040');
        px(i,2,4,12,11,'#d8d8d0'); px(i,2,4,3,11,'#b8b8b0'); px(i,11,4,3,11,'#b8b8b0');
        px(i,1,3,4,2,'#909088'); px(i,11,3,4,2,'#909088'); px(i,6,1,4,4,'#c8c8c0');
        px(i,7,0,2,2,'#e03030'); px(i,6,10,4,5,'#383028'); break;
      case 'town': px(i,0,0,16,16,'#48a040');
        px(i,2,7,12,8,'#c8a070'); px(i,1,4,14,4,'#b04030'); px(i,3,2,10,3,'#b04030');
        px(i,6,10,4,5,'#583820'); px(i,3,9,2,2,'#f8e8a0'); px(i,11,9,2,2,'#f8e8a0'); break;
      case 'cave': px(i,0,0,16,16,'#787068');

      case 'wall': px(i,0,0,16,16,'#888090');
        for(let yy=0;yy<4;yy++) for(let xx=0;xx<2;xx++)

      case 'floor': px(i,0,0,16,16,'#c8b088');

      case 'chest': px(i,0,0,16,16,'#c8b088');
        px(i,2,4,12,10,'#a06828'); px(i,2,4,12,3,'#c08840'); px(i,7,7,2,4,'#e8c030');
        px(i,2,4,1,10,'#583818'); px(i,13,4,1,10,'#583818'); break;
      case 'chest_open': px(i,0,0,16,16,'#c8b088');
        px(i,2,8,12,6,'#a06828'); px(i,3,9,10,4,'#382010'); break;
      case 'throne': px(i,0,0,16,16,'#a83838');
        px(i,3,1,10,14,'#e8c030'); px(i,5,3,6,10,'#a83838'); break;
      case 'carpet': px(i,0,0,16,16,'#a83838'); px(i,1,0,1,16,'#e8c030'); px(i,14,0,1,16,'#e8c030'); break;
      case 'cell': px(i,0,0,16,16,'#585058');
        for(let n=0;n<4;n++) px(i,2+n*4,0,1,16,'#282028'); break;
      case 'dark': px(i,0,0,16,16,'#000'); break;
      case 'water2': px(i,0,0,16,16,'#2858c0'); // 波アニメの2コマめ
        for(let n=0;n<5;n++) px(i,Math.floor(r()*13),Math.floor(r()*15),3,1,'#5888e8');

        px(i,2,2,1,1,'#f8f8f8'); px(i,5,2,1,1,'#f8f8f8'); px(i,2,5,1,1,'#f8f8f8'); px(i,5,5,1,1,'#f8f8f8');

        px(i,9,8,1,1,'#f8f8f8'); px(i,12,8,1,1,'#f8f8f8'); px(i,9,11,1,1,'#f8f8f8'); px(i,12,11,1,1,'#f8f8f8');
        break;
      case 'exit': px(i,0,0,16,16,'#181018'); // そとへの でぐち（ひかりがさす）
        px(i,1,0,2,16,'#c8a040'); px(i,13,0,2,16,'#c8a040'); px(i,1,0,14,2,'#c8a040');
        px(i,5,8,6,8,'#f8e890'); px(i,6,5,4,11,'#f8f0c0'); break;
      case 'barrier': px(i,0,0,16,16,'#382048');
        for(let n=0;n<6;n++) px(i,Math.floor(r()*14),Math.floor(r()*14),2,2,'#7038a0');
        px(i,3,3,1,1,'#c080e8'); px(i,11,9,1,1,'#c080e8'); break;
      case 'door': px(i,0,0,16,16,'#888090');
        px(i,2,1,12,14,'#7a4a20'); px(i,3,2,10,12,'#9a6630');
        px(i,4,3,8,1,'#b8854a'); px(i,10,8,2,2,'#e8c030'); break;
      case 'shrine': px(i,0,0,16,16,'#48a040');
        px(i,2,12,12,3,'#a8a098'); px(i,1,5,14,2,'#807870');
        px(i,3,7,10,6,'#c8c0b8'); px(i,6,9,4,4,'#383028'); px(i,7,1,2,4,'#c8c0b8'); break;
      case 'sign_w': case 'sign_a': case 'sign_i': case 'sign_n': { // 店のかんばん
        px(i,0,0,16,16,'#c8b088');
        px(i,7,10,2,5,'#6a4318');                 // 柱
        px(i,2,2,12,9,'#8a5a28'); px(i,3,3,10,7,'#b08040'); // 板
        if(k==='sign_w'){        // 剣
          px(i,7,3,2,5,'#d8d8e0'); px(i,6,7,4,1,'#e8c030'); px(i,7,8,2,2,'#a87820');

          px(i,6,4,4,1,'#c8d0e0'); px(i,6,5,4,3,'#5878c8'); px(i,7,8,2,1,'#5878c8');

          px(i,5,4,6,2,'#e8e8e8'); px(i,5,6,6,2,'#c03040'); px(i,4,4,1,4,'#6a4318'); px(i,11,4,1,4,'#6a4318');

        break; }

function drawTile(key,x,y){
  ctx.drawImage(atlas,tileIndex(key)*TS,0,TS,TS,x,y,TS,TS);
}

//==================================================================
//  ワールドマップ生成（64x64・シード固定）
//==================================================================
const MAPW=64,MAPH=64;
let world=[];
(function genWorld(){
  const r=mulberry(20260612);
  world=[];
  for(let y=0;y<MAPH;y++){ world.push(new Array(MAPW).fill('grass')); }
  // 外周は海（ゆらぎつき）
  for(let y=0;y<MAPH;y++) for(let x=0;x<MAPW;x++){
    const d=Math.min(x,y,MAPW-1-x,MAPH-1-y);
    if(d < 2+Math.floor(r()*3)) world[y][x]='water';
  }
  // 縦の大河（x=27〜28）と橋
  for(let y=2;y<46;y++){ world[y][27]='water'; world[y][28]='water'; }
  // 南の魔の島を隔てる横の河（y=44〜45, 西側）
  for(let x=2;x<28;x++){ world[44][x]='water'; world[45][x]='water'; }
  // 地形: 中を塗りつぶし、縁だけランダムにする「かたまり」
  function blob(t,cx,cy,rad){
    for(let y=Math.round(cy-rad);y<=cy+rad;y++) for(let x=Math.round(cx-rad);x<=cx+rad;x++){
      if(x<2||y<2||x>=MAPW-2||y>=MAPH-2) continue;
      if(world[y][x]!=='grass') continue;
      const dd=Math.hypot(x-cx,y-cy);
      if(dd<=rad-1 || (dd<=rad && r()<0.6)) world[y][x]=t;
    }
  }
  // 尾根に沿って blob を連ねて山脈をつくる
  function ridge(t,x1,y1,x2,y2,w){
    const steps=Math.ceil(Math.hypot(x2-x1,y2-y1))*2;
    for(let i=0;i<=steps;i++){
      const x=x1+(x2-x1)*i/steps+(r()*2-1), y=y1+(y2-y1)*i/steps+(r()*2-1);
      blob(t,Math.round(x),Math.round(y),w);
    }
  }
  // 山脈（連なり）
  ridge('mtn',48,6,58,16,2);   // 北東山脈
  ridge('mtn',31,34,40,40,1);  // 中央の尾根
  ridge('mtn',4,32,12,40,2);   // 西山脈
  ridge('mtn',44,46,56,56,2);  // 南東山脈
  ridge('mtn',5,48,8,57,1);    // 魔の島をはさむ尾根（西）
  ridge('mtn',17,48,21,57,1);  // 魔の島をはさむ尾根（東）
  // 進行を導く大山脈（とうげ＝街道だけが とおれる）
  ridge('mtn',35,1,34,37,2);   // 東西をわける山脈（うみから みなみの山なみまで）
  ridge('mtn',42,27,60,27,1);  // 砂漠の北をふさぐ尾根（とうげは みなみ街道）
  ridge('mtn',2,36,26,36,1);   // 南西をふさぐ尾根（とうげは ぬまへのみち）
  // 丘は山のふもとに
  blob('hill',44,14,3); blob('hill',40,28,4); blob('hill',14,36,3); blob('hill',22,8,4);
  // 森（かたまり）
  blob('forest',20,28,5); blob('forest',38,8,5); blob('forest',46,40,4);
  blob('forest',8,26,4);  blob('forest',34,20,4); blob('forest',18,20,3);
  // 追加の地形（フィールドの密度アップ）
  blob('forest',52,20,4); blob('forest',26,20,4); blob('forest',12,18,3);
  blob('forest',33,28,3); blob('forest',56,40,3); blob('forest',22,12,3);
  blob('hill',34,12,3); blob('hill',18,33,3); blob('hill',48,36,3); blob('hill',8,16,3);
  blob('water',22,24,2); blob('water',36,24,2); blob('water',46,11,2); blob('water',16,28,2); // 湖
  blob('swamp',20,40,3); // ぬまのどうくつ の周辺
  // 砂漠（南東）
  for(let y=28;y<44;y++) for(let x=42;x<60;x++)
    if(world[y][x]==='grass'&&r()<0.92) world[y][x]='desert';
  // 魔の島（南西）は毒の沼だらけ
  for(let y=47;y<60;y++) for(let x=4;x<26;x++)
    if(world[y][x]==='grass'&&r()<0.55) world[y][x]='swamp';
  // ぽつぽつ除去: となりに同じ地形がない山・森・丘は草原に戻す
  for(let y=2;y<MAPH-2;y++) for(let x=2;x<MAPW-2;x++){
    const t=world[y][x];
    if(t!=='mtn'&&t!=='forest'&&t!=='hill') continue;
    let same=0;
    for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]])
      if(world[y+dy][x+dx]===t) same++;
    if(same===0) world[y][x]='grass';
  }
  // 橋
  world[14][27]='bridge'; world[14][28]='bridge';
  world[34][27]='bridge'; world[34][28]='bridge';
  world[44][14]='bridge'; world[45][14]='bridge';
  // 道を確保（主要ルートを草原化）
  function carve(x1,y1,x2,y2){
    let x=x1,y=y1;
    while(x!==x2){ if(world[y][x]!=='bridge'&&world[y][x]!=='water') world[y][x]='grass'; x+= x<x2?1:-1; }
    while(y!==y2){ if(world[y][x]!=='bridge'&&world[y][x]!=='water') world[y][x]='grass'; y+= y<y2?1:-1; }
  }
  carve(12,12,26,14); carve(29,14,42,16); carve(42,16,50,34);
  carve(29,34,26,34); carve(26,34,14,43); carve(14,46,12,52);
  carve(50,30,47,30);  // いやしのほこらへ（さばく）
  carve(14,40,20,40);  // ぬまのどうくつへ
  carve(14,42,10,42);  // けんじゃのほこらへ
  carve(50,24,52,24);  // はいきょのまちへ
  // ランドマーク
  world[12][12]='castle';  // ラダム城
  world[14][16]='town';    // 城下町カナン
  world[16][42]='town2';   // 港町ポルテ（タイルはtownを使う）

  world[24][52]='town3';   // はいきょのまち
  // 入口の周囲は歩けるように
  [[12,12],[16,14],[42,16],[50,34],[12,52],[46,30],[10,42],[20,40],[52,24]].forEach(([x,y])=>{
    for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
      const t=world[y+dy][x+dx];
      if((t==='water'||t==='mtn')&&!(dx===0&&dy===0)) world[y+dy][x+dx]='grass';
    }
  });
})();
function worldTileKey(t,x,y){
  if(t==='town2'||t==='town3') return 'town';
  if(t==='dcastle') return 'castle';
  if(t==='pcave') return 'cave';
  if(t==='shrine'||t==='shrine2') return 'shrine';
  if(t==='grass' && ((x*7+y*13)%29===0)) return 'flower'; // ところどころ花ばたけ
  if(t==='water' && ((x+y+(frame>>5))%2===0)) return 'water2'; // 波のアニメ
  return t;
}
function zoneAt(x,y){
  if(y>=46 && x<27) return 4;            // 魔の島
  if(x>=40 && y>=24) return 3;           // 砂漠・洞窟
  if(x>=29) return 2;                    // 川の東
  const d=Math.hypot(x-12,y-12);
  return d>13 ? 1 : 0;                   // 城の近く
}

const SAVE_KEY='regalia_quest_save';
let G=null;
function newGame(){
  G={ lv:1, exp:0, hp:LV_HP[0], mp:LV_MP[0], gold:120,
      weapon:0, armor:0, shield:0,
      items:{herb:2, torch:1, wing:0, key:0},
      flags:{sword:false, shield:false, cleared:false, princessSaved:false, dragoDead:false, devilDead:false, charm:false},
      chests:{}, doors:{},
      map:'world', x:12, y:13, dir:'d', light:0,
  };
}
function maxHP(){ return LV_HP[G.lv-1]; }
function maxMP(){ return LV_MP[G.lv-1]; }
function str(){ return LV_STR[G.lv-1]; }
function agi(){ return LV_AGI[G.lv-1]; }
function atk(){ return str()+WEAPONS[G.weapon].atk; }
function dfn(){ return Math.floor(agi()/2)+ARMORS[G.armor].def+SHIELDS[G.shield].def; }
function saveGame(){
  localStorage.setItem(SAVE_KEY,JSON.stringify(G));
}
function loadGame(){
  const s=localStorage.getItem(SAVE_KEY);
  if(!s) return false;
  try{ G=JSON.parse(s); G.map='world'; G.x=12; G.y=13; G.dir='d'; G.light=0;
    G.doors=G.doors||{}; G.items.key=G.items.key||0; // ふるいセーブへの対応
    return true; }
  catch(e){ return false; }
}
function knownSpells(){ return SPELLS.filter(s=>G.lv>=s.lv); }

const FONT="17px 'DotGothic16',monospace";
function drawWindow(x,y,w,h){
  ctx.fillStyle='#000'; ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='#fff'; ctx.lineWidth=2;
  ctx.strokeRect(x+3,y+3,w-6,h-6);
}
function drawText(s,x,y,color){
  ctx.font=FONT; ctx.fillStyle=color||'#fff';
  ctx.textBaseline='top'; ctx.fillText(s,x,y);
}

let MSG=null;   // {lines:[..], page, chars, cb}
let CHOICE=null;// {title, options, sel, cb, x,y,w}
let MENU=null;  // フィールドメニュー状態

function showMsg(text,cb){
  // 配列の1要素＝1ページ（文のまとまりで切る）。ながい行は自動でおりかえす。
  const items=(Array.isArray(text)?text:[text]);
  const pages=[];
  for(const t of items){
    const lines=String(t).split('\n').flatMap(l=>{
      const out=[]; let cur=l;
      while(cur.length>23){ out.push(cur.slice(0,23)); cur=cur.slice(23); }
      out.push(cur); return out;
    });
    for(let i=0;i<lines.length;i+=3) pages.push(lines.slice(i,i+3));
  }
  MSG={pages, page:0, chars:0, cb:cb||null, done:false};
}
function msgUpdate(){
  if(!MSG) return;
  const cur=MSG.pages[MSG.page].join('\n');
  if(MSG.chars<cur.length) MSG.chars=Math.min(cur.length,MSG.chars+2);
  if(keyPressed('z')||keyPressed('Enter')||keyPressed(' ')){
    if(MSG.chars<cur.length){ MSG.chars=cur.length; }
    else if(MSG.page<MSG.pages.length-1){ MSG.page++; MSG.chars=0; sfx('cursor'); }
    else { const cb=MSG.cb; MSG=null; if(cb) cb(); }
  }
}
function msgDraw(){
  if(!MSG) return;
  drawWindow(16,328,480,104);
  const lines=MSG.pages[MSG.page]; let cnt=MSG.chars;
  for(let i=0;i<lines.length;i++){
    const show=lines[i].slice(0,Math.max(0,cnt)); cnt-=lines[i].length;
    drawText(show,36,346+i*26);
  }
  if(cnt>=0 && MSG.page<MSG.pages.length-1 && Math.floor(frame/20)%2===0)
    drawText('▼',248,408);
}
function showChoice(options,cb,opt){
  CHOICE={options, sel:0, cb, x:(opt&&opt.x)||330, y:(opt&&opt.y)||120,
          w:(opt&&opt.w)||160, title:(opt&&opt.title)||null};
}
function choiceUpdate(){
  if(!CHOICE) return;
  if(keyPressed('ArrowUp')){ CHOICE.sel=(CHOICE.sel+CHOICE.options.length-1)%CHOICE.options.length; sfx('cursor'); }
  if(keyPressed('ArrowDown')){ CHOICE.sel=(CHOICE.sel+1)%CHOICE.options.length; sfx('cursor'); }
  if(keyPressed('z')||keyPressed('Enter')||keyPressed(' ')){
    const c=CHOICE; CHOICE=null; sfx('ok'); c.cb(c.sel);
  } else if(keyPressed('x')||keyPressed('Escape')){
    const c=CHOICE; CHOICE=null; sfx('cancel'); c.cb(-1);
  }
}
function choiceDraw(){
  if(!CHOICE) return;
  const h=CHOICE.options.length*26+30+(CHOICE.title?26:0);
  drawWindow(CHOICE.x,CHOICE.y,CHOICE.w,h);
  let yy=CHOICE.y+16;
  if(CHOICE.title){ drawText(CHOICE.title,CHOICE.x+18,yy,'#8f8'); yy+=26; }
  CHOICE.options.forEach((o,i)=>{
    if(i===CHOICE.sel) drawText('▶',CHOICE.x+12,yy+i*26,'#fff');
    drawText(o,CHOICE.x+34,yy+i*26);
  });
}

const keys={}, pressed={};
window.addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  const k=e.key.length===1?e.key.toLowerCase():e.key;
  if(!keys[k]) pressed[k]=true;
  keys[k]=true; audio();
  if(k==='m'){ muted=!muted; }
});
window.addEventListener('keyup',e=>{
  const k=e.key.length===1?e.key.toLowerCase():e.key;
  keys[k]=false;
});
function keyDown(k){ return !!keys[k]; }
function keyPressed(k){ return !!pressed[k]; }
// タッチパッド
document.querySelectorAll('#pad .btn').forEach(b=>{
  const k=b.dataset.k;
  const dn=e=>{ e.preventDefault(); if(!keys[k]) pressed[k]=true; keys[k]=true; audio(); };
  const up=e=>{ e.preventDefault(); keys[k]=false; };
  b.addEventListener('touchstart',dn); b.addEventListener('touchend',up);
  b.addEventListener('mousedown',dn); b.addEventListener('mouseup',up);
});

//==================================================================
//  フィールド（ワールド／屋内 共通）
//==================================================================
let mode='title';
let frame=0;
const WALK=10; // 1マス移動にかけるフレーム数（大きいほどゆっくり）
let moveAnim=0, moveDx=0, moveDy=0;
let idleTime=0, battleShake=0, encGrace=0;
let titleSel=0;
let flashTimer=0;

function curMap(){ return G.map==='world'?null:INDOOR[G.map]; }
function tileAt(x,y){
  if(G.map==='world'){
    if(x<0||y<0||x>=MAPW||y>=MAPH) return 'water';
    return world[y][x];
  }
  const m=curMap();
  if(y<0||y>=m.rows.length||x<0||x>=m.rows[0].length) return '#';
  // 開封済み宝箱
  if(m.rows[y][x]==='c' && G.chests[G.map+':'+x+','+y]) return 'c_open';
  if(m.rows[y][x]==='D' && G.doors && G.doors[G.map+':'+x+','+y]) return '.';
  return m.rows[y][x];
}
function npcActive(n){
  if(n.hideIf && G.flags[n.hideIf]) return false;
  if(n.showIf && !G.flags[n.showIf]) return false;
  if((n.id==='princess'||n.id==='demon')&&G.flags.cleared) return false;
  return true;
}
function isBlocked(x,y){
  const t=tileAt(x,y);
  if(G.map==='world') return t==='water'||t==='mtn';
  if(t==='#'||t==='C'||t==='t'||t==='B'||t==='W'||t==='A'||t==='I'||t==='N'||t==='D'||t==='T'||t==='w') return true;
  const m=curMap();
  if(m.npcs && m.npcs.some(n=>npcActive(n)&&n.x===x&&n.y===y)) return true;
  return false;
}
function enterMap(name,x,y){
  G.map=name; G.x=x; G.y=y; G.light=0;
  const m=curMap();
  if(m) playMusic(m.music);
  else playMusic(zoneAt(x,y)>=4?'island':(x>=29?'field2':'field'));
}
function fieldUpdate(){
  if(MSG){ msgUpdate(); idleTime=0; return; }
  if(CHOICE){ choiceUpdate(); idleTime=0; return; }
  if(MENU){ menuUpdate(); return; }
  if(moveAnim>0){
    moveAnim--; idleTime=0;
    if(moveAnim===0) onStep();
    return;
  }
  idleTime++;
  // メニュー
  if(keyPressed('x')||keyPressed('Escape')){ openMenu(); return; }
  // 調べる/話す
  if(keyPressed('z')||keyPressed('Enter')||keyPressed(' ')){ doTalk(); return; }
  // 移動
  let dx=0,dy=0;
  if(keyDown('ArrowUp')||keyDown('w')){ dy=-1; G.dir='u'; }
  else if(keyDown('ArrowDown')||keyDown('s')){ dy=1; G.dir='d'; }
  else if(keyDown('ArrowLeft')||keyDown('a')){ dx=-1; G.dir='l'; }
  else if(keyDown('ArrowRight')||keyDown('d')){ dx=1; G.dir='r'; }
  if(dx||dy){
    if(!isBlocked(G.x+dx,G.y+dy)){
      G.x+=dx; G.y+=dy; moveDx=dx; moveDy=dy; moveAnim=WALK;
    }
  }
}
function onStep(){
  const t=tileAt(G.x,G.y);
  if(G.map==='world'){
    if(t==='castle'){ enterMap('castle',8,10); sfx('stairs'); return; }
    if(t==='town'){ enterMap('town1',9,12); sfx('stairs'); return; }
    if(t==='town2'){ enterMap('town2',9,10); sfx('stairs'); return; }
    if(t==='cave'){ enterMap('cave1',18,6); sfx('stairs'); return; }
    if(t==='town3'){ enterMap('town3',10,10); sfx('stairs'); return; }
    if(t==='pcave'){ enterMap('pcave',2,1); sfx('stairs'); return; }
    if(t==='shrine'){ enterMap('shrine1',4,4); sfx('stairs'); return; }
    if(t==='shrine2'){ enterMap('shrine2',4,4); sfx('stairs'); return; }
    if(t==='dcastle'){
      if(!G.flags.charm){
        sfx('cancel');
        showMsg('みえない ちからに はばまれて\nしろに はいれない！\n（なにかの まもりが ひつようだ）');
        return;
      }
      enterMap('dcastle1',7,12); sfx('stairs'); return;
    }
    if(t==='swamp'){ G.hp=Math.max(1,G.hp-2); flashTimer=8; sfx('swamp'); }
    // 地域でBGMがかわる（川の東・魔の島）
    const wantBgm = zoneAt(G.x,G.y)>=4 ? 'island' : (G.x>=29 ? 'field2' : 'field');
    if(musicName!==wantBgm) playMusic(wantBgm);
    // エンカウント（険しい地形ほど強敵・高頻度。戦闘直後はしばらく出ない）
    const rough = (t==='forest'||t==='swamp'||t==='hill'||t==='desert');
    if(encGrace>0){ encGrace--; }
    else {
      const enc = rough ? 11 : 16;
      if(Math.random()*enc<1){
        let table = ZONES[zoneAt(G.x,G.y)];
        if(t==='desert') table=DESERT_ZONE;
        startBattle(pickEnemy(table,rough));
      }
    }
  } else {
    const m=curMap();
    if(t==='E'){ const e=m.exit; enterMap(e.map,e.x,e.y); G.dir='d'; return; }
    if(t==='>'||t==='<'){
      const d=m.stairs&&m.stairs[G.x+','+G.y];
      if(d){ enterMap(d.map,d.x,d.y); sfx('stairs'); return; }
    }
    if(t==='x'){ G.hp=Math.max(1,G.hp-15); flashTimer=8; sfx('swamp'); } // けっかいの床
    if(m.encounter){
      if(G.light>0) G.light--;
      if(encGrace>0){ encGrace--; }
      else if(Math.random()*(m.encounter==='dcastle'?10:13)<1)
        startBattle(pickEnemy(ENC_TABLES[m.encounter]||CAVE_ZONE,true));
    }
  }
}
function facing(){
  const d={u:[0,-1],d:[0,1],l:[-1,0],r:[1,0]}[G.dir];
  return [G.x+d[0],G.y+d[1]];
}
function doTalk(){
  const [fx,fy]=facing();
  const m=curMap();
  // 宝箱（足元 or 目の前）
  for(const [cx,cy] of [[G.x,G.y],[fx,fy]]){
    if(m && tileAt(cx,cy)==='c'){
      openChest(cx,cy); return;
    }
  }
  // かぎのかかった とびら
  if(m && tileAt(fx,fy)==='D'){
    if((G.items.key||0)>0){
      G.items.key--; G.doors[G.map+':'+fx+','+fy]=true; sfx('stairs');
      showMsg('まほうのかぎを つかった！\nとびらが ひらいた。');
    } else {
      showMsg('かぎが かかっている。\n（まほうのかぎが ひつようだ）');
    }
    return;
  }
  if(m && m.npcs){
    let tx=fx, ty=fy;
    // カウンター越しに ひとつ先まで しらべる
    if(tileAt(tx,ty)==='C'){
      const d={u:[0,-1],d:[0,1],l:[-1,0],r:[1,0]}[G.dir];
      tx+=d[0]; ty+=d[1];
    }
    const n=m.npcs.find(n=>npcActive(n)&&n.x===tx&&n.y===ty);
    if(n){ talkNpc(n); return; }
  }
  // かんばん
  const signMsg={W:'かんばんには「ぶきや」と かいてある。',A:'かんばんには「ぼうぐや」と かいてある。',
                 I:'かんばんには「どうぐや」と かいてある。',N:'かんばんには「やどや」と かいてある。'};
  if(m && signMsg[tileAt(fx,fy)]){ showMsg(signMsg[tileAt(fx,fy)]); return; }
  showMsg('しらべたが なにもない。');
}
function openChest(cx,cy){
  const m=curMap();
  const key=G.map+':'+cx+','+cy;
  const def=m.chests && m.chests[cx+','+cy];
  if(!def){ showMsg('たからばこは からっぽだ。'); return; }
  G.chests[key]=true; sfx('gold');
  if(def.gold){ G.gold+=def.gold; showMsg(def.gold+'ゴールドを てにいれた！'); }
  else if(def.item==='sword'){
    if(G.flags.sword){ showMsg('たからばこは からっぽだ。'); return; }
    G.flags.sword=true; G.weapon=6; sfx('levelup');
    showMsg(['なんと でんせつのぶき\n「レガリアのけん」を てにいれた！','ゆうしゃは レガリアのけんを そうびした！']);
  }
  else if(def.item==='shield'){
    if(G.flags.shield){ showMsg('たからばこは からっぽだ。'); return; }
    G.flags.shield=true; G.shield=3; sfx('levelup');
    showMsg(['「まもりのたて」を てにいれた！','ゆうしゃは まもりのたてを そうびした！']);
  }
  else if(def.itemKey){
    const it=ITEMS[def.itemKey];
    G.items[def.itemKey]=Math.min(9,(G.items[def.itemKey]||0)+1);
    showMsg(it.name+'を てにいれた！');
  }
  else if(def.armor!==undefined){
    sfx('levelup');
    if(G.armor<def.armor){ G.armor=def.armor;
      showMsg(['なんと「'+ARMORS[def.armor].name+'」を てにいれた！','ゆうしゃは '+ARMORS[def.armor].name+'を そうびした！']); }
    else showMsg('「'+ARMORS[def.armor].name+'」を てにいれた！\nだが いまのそうびのほうが つよい。');
  }
}

function talkNpc(n){
  if(n.text){ showMsg(n.text); return; }
  switch(n.id){
    case 'king': kingTalk(); break;
    case 'inn': innTalk(n.price); break;
    case 'shop_weapon': shopTalk('ぶきや',WEAPONS,[1,2,3],'weapon'); break;
    case 'shop_armor':  shopTalk('ぼうぐや',ARMORS,[1,2],'armor',SHIELDS,[1]); break;
    case 'shop_weapon2':shopTalk('ぶきや',WEAPONS,[3,4,5],'weapon'); break;
    case 'shop_armor2': shopTalk('ぼうぐや',ARMORS,[2,3,4],'armor',SHIELDS,[2]); break;
    case 'shop_item': itemShop(['herb','torch','wing']); break;
    case 'shop_item2': itemShop(['herb','torch','wing','key','elixir']); break;
    case 'healer':
      G.hp=maxHP(); G.mp=maxMP(); sfx('heal');
      showMsg(['ろうじん「よく きたな たびのひと。\nつかれを いやして いくがよい」','ふしぎなひかりが ゆうしゃをつつんだ！\nHPとMPが まんたんに なった！']);
      break;
    case 'sage':
      if(!G.flags.princessSaved){
        showMsg(['けんじゃ「まおうのしろには みえない\nちからの まもりが かかっておる。','まずは きたの ぬまのどうくつから\nひめを すくいだすのじゃ。\nはなしは それからよ」']);
      } else if(!G.flags.charm){
        G.flags.charm=true; sfx('levelup');
        showMsg(['けんじゃ「おお、ひめを すくったか！\nみごとじゃ ゆうしゃよ。','さずけよう……「せいなるおまもり」！\nこれで まのしまの しろに はいれる。','ガルドは にどめの すがたこそ しん。\nHPを たもったまま いっせんめを\nきりぬけるのじゃぞ」']);
      } else {
        showMsg(['けんじゃ「しろの とびらには まほうの\nかぎが いる。みなとまちで そろえよ。','けっせんの まえには HPとMPを\nまんたんに しておくのじゃぞ」']);
      }
      break;
    case 'devil':
      showMsg('デビルナイト「ガルドさまの もとへは\nだれも とおさぬ……！」',()=>startBattle('devil','devilDead'));
      break;
    case 'drago':
      showMsg('どうくつの ぬしが めをさました！\n「グルルルル…！」',()=>startBattle('drago','dragoDead'));
      break;
    case 'princess2':
      showMsg('リナひめ「あなたは…ゆうしゃさま！\nたすけに きてくださったのですね！」',()=>{
        G.flags.princessSaved=true; sfx('levelup');
        showMsg('ゆうしゃは リナひめを つれて\nラダムじょうへ おくりとどけた！',()=>{
          enterMap('castle',8,9);
          G.gold+=400; G.items.wing=Math.min(9,(G.items.wing||0)+2);
          showMsg(['おう「おお リナ！ ぶじだったか！','ゆうしゃよ れいを いわせてくれ。\nほうびに 400ゴールドと\nそらとぶはね 2まいを さずけよう！','のこるは まおうガルドのみ。\nたのんだぞ！」']);
        });
      });
      break;
    case 'princess_castle':
      showMsg('リナひめ「ゆうしゃさま、ごぶじで\nなによりです。どうか おきをつけて」');
      break;
    case 'demon': demonTalk(); break;
    case 'princess':
      showMsg(['リナひめ「ゆうしゃさま…！\nどうか おきをつけて。','ガルドは おそろしい ちからを\nかくしもって います…！」']);
      break;
  }
}
function kingTalk(){
  if(G.flags.cleared){
    showMsg(['おう「おお ゆうしゃよ！ よくぞ\nまおうガルドを たおしてくれた！','そなたこそ まことの えいゆうじゃ。\nこのくにの へいわは えいえんに\nかたりつがれるであろう！」']);
    return;
  }
  const saveChoice=()=>{
    showChoice(['ぼうけんを きろくする','やめておく'],sel=>{
      if(sel===0){ saveGame(); sfx('levelup');
        showMsg(['おう「そなたの ぼうけんを\nきろくしたぞ。','やすむときは そのまま ブラウザを\nとじて かまわぬ。','つぎは タイトルの「つづきから」で\nこの しろから さいかいできるぞ」']); }
    },{title:'きろく',w:280,x:210});
  };
  if(G.flags.princessSaved){
    showMsg(['おう「リナを すくってくれて\nまことに ありがとう！','のこるは まおうガルドのみ。だが しろは\nみえないちからに まもられておる。','みなみの けんじゃのほこらを たずね、\nしまに はいるすべを さずかるのじゃ」'],saveChoice);
    return;
  }
  showMsg(['おう「おお ゆうしゃよ、\nよくぞ まいられた。','まおうの てしたが むすめリナをさらい\nみなみの ぬまちの どうくつに\nとじこめてしまった。','どうくつは おそろしい ドラゴンが\nみはっているという。\nじゅんびを おこたるでないぞ。','みちに まよったら まちのひとや\nほこらの けんじゃに たずねるとよい。','どうか むすめと このくにを\nすくってくれ！」'],saveChoice);
}
function innTalk(price){
  showChoice(['とまる ('+price+'G)','やめる'],sel=>{
    if(sel!==0) return;
    if(G.gold<price){ showMsg('やどや「おかねが たりないようだね」'); return; }
    G.gold-=price; G.hp=maxHP(); G.mp=maxMP();
    sfx('heal');
    showMsg('やどや「おはようございます。\nゆうべは ゆっくり やすめたようで\nなによりです。いってらっしゃい！」');
  },{title:'やどや',w:240,x:250});
}
function shopTalk(title,list,idxs,slot,list2,idxs2){
  const again=()=>shopTalk(title,list,idxs,slot,list2,idxs2); // 買ったあとも店をひらきなおす
  const entries=idxs.map(i=>({list,idx:i,slot}));
  if(list2) idxs2.forEach(i=>entries.push({list:list2,idx:i,slot:'shield'}));
  const labels=entries.map(e=>e.list[e.idx].name+' '+e.list[e.idx].price+'G');
  labels.push('やめる');
  showChoice(labels,sel=>{
    if(sel<0||sel===entries.length){ showMsg(title+'「まいど！ またきてくれよな」'); return; }
    const e=entries[sel], it=e.list[e.idx];
    if(G.gold<it.price){ showMsg(title+'「おかねが たりないよ」',again); return; }
    const cur=e.slot==='weapon'?G.weapon:(e.slot==='armor'?G.armor:G.shield);
    if(cur===e.idx){ showMsg(title+'「それは もう もっているよ」',again); return; }
    G.gold-=it.price; sfx('gold');
    if(e.slot==='weapon') G.weapon=e.idx;
    else if(e.slot==='armor') G.armor=e.idx;
    else G.shield=e.idx;
    showMsg(it.name+'を かって そうびした！\n「ほかにも みていくかい？」',again);
  },{title,w:300,x:196,y:80});
}
function itemShop(stock){
  const keys=stock||['herb','torch','wing'];
  const again=()=>itemShop(stock);
  const labels=keys.map(k=>ITEMS[k].name+' '+ITEMS[k].price+'G');
  labels.push('やめる');
  showChoice(labels,sel=>{
    if(sel<0||sel===keys.length){ showMsg('どうぐや「まいど ありがとう！」'); return; }
    const k=keys[sel], it=ITEMS[k];
    if(G.gold<it.price){ showMsg('どうぐや「おかねが たりないよ」',again); return; }
    if((G.items[k]||0)>=9){ showMsg('どうぐや「そんなに もてないよ」',again); return; }
    G.gold-=it.price; G.items[k]=(G.items[k]||0)+1; sfx('gold');
    showMsg(it.name+'を かった！\n「ほかにも どうだい？」',again);
  },{title:'どうぐや',w:300,x:196,y:80});
}
function demonTalk(){
  if(G.flags.cleared){ showMsg('そこには もう だれもいない…'); return; }
  showMsg(['まおうガルド「よくぞ ここまで きたな\nちっぽけな ゆうしゃよ。','わしと てを くめば のぞむものを\nすべて あたえよう。','どうだ、わしの なかまに なるか？」'],()=>{

          G.hp=maxHP(); G.mp=maxMP();
          enterMap('castle',8,9);

    'こうげき力:'+atk()+'  しゅび力:'+dfn(),
    'E:'+WEAPONS[G.weapon].name+' / '+ARMORS[G.armor].name+' / '+SHIELDS[G.shield].name]);
}
function fieldSpellMenu(){
  const sp=knownSpells();
  if(!sp.length){ showMsg('まだ じゅもんを おぼえていない。'); return; }
  showChoice(sp.map(s=>s.name+' ('+s.mp+')').concat(['やめる']),sel=>{
    if(sel<0||sel===sp.length) return;
    const s=sp[sel];
    if(G.mp<s.mp){ showMsg('MPが たりない！'); return; }
    switch(s.id){
      case 'heal': case 'heal2': {
        if(G.hp>=maxHP()){ showMsg('HPは まんたんだ。'); return; }
        G.mp-=s.mp; sfx('heal');
        const v=s.id==='heal'?irnd(25,35):irnd(80,100);
        G.hp=Math.min(maxHP(),G.hp+v);
        showMsg('ヒールの ひかりが つつむ！\nHPが '+v+' かいふくした。'); break;
      }
      case 'light': {
        const m=curMap();
        if(!m||!m.dark){ showMsg('ここでは つかえない。'); return; }
        G.mp-=s.mp; G.light=120; sfx('spell');
        showMsg('あたりが あかるくなった！'); break;
      }
      case 'return': {
        const rm=curMap();
        if(rm&&rm.escape){ // どうくつからは そとへ だっしゅつ
          G.mp-=s.mp; sfx('spell');
          showMsg('ゆうしゃのからだが ひかりにつつまれ\nそとへ はこばれた！',()=>{ enterMap(rm.escape.map,rm.escape.x,rm.escape.y); });
          break;
        }
        if(rm){ showMsg('ここでは つかえない。'); return; }
        G.mp-=s.mp; sfx('spell');
        showMsg('からだが ふわりと うきあがった！',()=>{ enterMap('world',12,13); });
        break;
      }
      default: showMsg('たたかいの ときに つかうのだ。');
    }
  },{title:'じゅもん',x:280,y:30,w:210});
}
function fieldItemMenu(){
  const ks=Object.keys(G.items).filter(k=>G.items[k]>0);
  if(!ks.length){ showMsg('なにも もっていない。'); return; }
  showChoice(ks.map(k=>ITEMS[k].name+' x'+G.items[k]).concat(['やめる']),sel=>{
    if(sel<0||sel===ks.length) return;
    const k=ks[sel];
    if(k==='herb'){
      if(G.hp>=maxHP()){ showMsg('HPは まんたんだ。'); return; }
      G.items[k]--; sfx('heal');
      const v=irnd(25,35); G.hp=Math.min(maxHP(),G.hp+v);
      showMsg('やくそうを つかった！\nHPが '+v+' かいふくした。');
    } else if(k==='torch'){
      const m=curMap();
      if(!m||!m.dark){ showMsg('ここでは つかえない。'); return; }
      G.items[k]--; G.light=80; sfx('spell');
      showMsg('たいまつに ひを つけた！');
    } else if(k==='wing'){
      if(curMap()){ showMsg('ここでは つかえない。'); return; }
      G.items[k]--; sfx('spell');
      showMsg('そらとぶはねを なげた！',()=>{ enterMap('world',12,13); });
    } else if(k==='key'){
      showMsg('とびらの まえに たって\nZキーを おせば つかえる。');
    } else if(k==='elixir'){
      if(G.hp>=maxHP()){ showMsg('HPは まんたんだ。'); return; }
      G.items[k]--; sfx('heal');
      G.hp=maxHP();
      showMsg('いのちのみずを のんだ！\nHPが かんぜんに かいふくした！');

  },{title:'どうぐ',x:280,y:30,w:210});
}

function fieldDraw(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,512,448);
  const VW=16,VH=14;
  // スクロール位置（移動補間）
  let ox=0,oy=0;
  // 移動中は「ひとつ前のカメラ位置」から現在位置へ滑らかに寄せる（符号は正）
  if(moveAnim>0){ ox=moveDx*(moveAnim/WALK)*TS; oy=moveDy*(moveAnim/WALK)*TS; }
  const camx=G.x-Math.floor(VW/2), camy=G.y-Math.floor(VH/2);
  const m=curMap();
  const dark = m&&m.dark&&G.light===0 ? 1 : (m&&m.dark&&G.light>0?2:0);
  for(let vy=-1;vy<=VH;vy++) for(let vx=-1;vx<=VW;vx++){
    const tx=camx+vx, ty=camy+vy;
    const sx=vx*TS+ox, sy=vy*TS+oy;
    if(dark===1 && (Math.abs(tx-G.x)>1||Math.abs(ty-G.y)>1)){ continue; }
    if(dark===2 && (Math.abs(tx-G.x)>3||Math.abs(ty-G.y)>3)){ continue; }
    let key;
    const t=tileAt(tx,ty);
    if(G.map==='world') key=worldTileKey(t,tx,ty);
    else {
      switch(t){
        case '#': key='wall'; break;
        case 'C': key='counter'; break;
        case '>': key='stairs_d'; break;
        case '<': key='stairs_u'; break;
        case 'c': key='chest'; break;
        case 'c_open': key='chest_open'; break;
        case 't': key='throne'; break;
        case 'r': key='carpet'; break;
        case 'B': key='cell'; break;
        case 'D': key='door'; break;
        case 'x': key='barrier'; break;
        case 'g': key='grass'; break;
        case 'T': key='forest'; break;
        case 'w': key='water'; break;
        case 'W': key='sign_w'; break;
        case 'A': key='sign_a'; break;
        case 'I': key='sign_i'; break;
        case 'N': key='sign_n'; break;
        case 'E': key='exit'; break; // 出口はどこでも見えるように
        default: key=m.floor;
      }
    }
    drawTile(key,sx,sy);
  }
  // NPC
  if(m&&m.npcs){
    for(const n of m.npcs){
      if(!npcActive(n)) continue;
      const sx=(n.x-camx)*TS+ox, sy=(n.y-camy)*TS+oy;
      if(dark===1&&(Math.abs(n.x-G.x)>1||Math.abs(n.y-G.y)>1)) continue;
      if(dark===2&&(Math.abs(n.x-G.x)>3||Math.abs(n.y-G.y)>3)) continue;
      drawArt(n.art,sx,sy,2,false);
    }
  }
  // 勇者（画面中央固定・2フレーム歩行アニメ）
  const hx=Math.floor(VW/2)*TS, hy=Math.floor(VH/2)*TS;
  const useWalk = moveAnim>WALK/2;
  const base = G.dir==='u'?'hero_u':(G.dir==='d'?'hero_d':'hero_l');
  drawArt(base+(useWalk?'_w':''),hx,hy,2,G.dir==='r');
  // ダメージフラッシュ
  if(flashTimer>0){ flashTimer--;
    ctx.fillStyle='rgba(255,0,0,0.25)'; ctx.fillRect(0,0,512,448); }
  // 場所名（屋内・右上に表示してステータス窓と重ならないように）
  if(m){
    ctx.font="14px 'DotGothic16',monospace";
    const nw=m.name.length*15+16;
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(504-nw,8,nw,24);
    drawText(m.name,512-nw,12,'#ffd'); ctx.font=FONT;
  }
  // 立ちどまると ステータス窓が出る（メッセージ・選択中も表示）
  if(MSG||CHOICE||MENU||idleTime>40) drawStatusWin();
  msgDraw(); choiceDraw();
}

let B=null; // {key, name, hp, maxhp, ..., phase, shake}
// strong=true(険しい地形)なら強い側、false(平地)なら弱い側に寄せて選ぶ
function pickEnemy(table,strong){
  const u=Math.random();
  const idx=Math.floor(Math.pow(u, strong?0.85:1.7)*table.length);
  return table[Math.min(idx,table.length-1)];
}
function startBattle(key,winFlag){
  const mdef=MONSTERS[key];
  B={ key, winFlag:winFlag||null, name:mdef.name, hp:mdef.hp+irnd(0,Math.floor(mdef.hp/8)),
      atk:mdef.atk, def:mdef.def, agi:mdef.agi,
      exp:mdef.exp, gold:mdef.gold+irnd(0,Math.floor(mdef.gold/4)),
      spell:mdef.spell, boss:!!mdef.boss,
      shake:0, flash:0, dead:false, sleep:0 };
  mode='battle';
  playMusic((key==='boss1'||key==='boss2')?'last':(B.boss?'boss':'battle'));
  showMsg(B.name+'が あらわれた！',()=>battleCommand());
}
function battleCommand(){
  showChoice(['たたかう','じゅもん','どうぐ','にげる'],sel=>{
    if(sel<0){ battleCommand(); return; } // キャンセルはコマンド選びなおし
    if(sel===0) playerAttack();
    else if(sel===1) battleSpell();
    else if(sel===2) battleItem();
    else tryRun();
  },{title:'コマンド',x:20,y:160,w:170});
}
function dmgCalc(a,d){
  const base=Math.max(1,a-Math.floor(d/2));
  return Math.max(0,irnd(Math.floor(base/3),Math.floor(base*2/3)));
}
function playerAttack(){
  sfx('attack');
  let d; let crit=false;
  if(irnd(1,24)===1){ crit=true; d=irnd(Math.floor(atk()*0.8),atk()); }
  else d=dmgCalc(atk(),B.def);
  B.shake=10;
  const head='ゆうしゃの こうげき！';
  const lines=[crit?head+'\nきょうれつな いちげき！！':head,
    d>0?B.name+'に '+d+'の ダメージ！':'ミス！ ダメージを あたえられない！'];
  B.hp-=d;
  showMsg(lines,()=>afterPlayerAction());
}
function battleSpell(){
  const sp=knownSpells().filter(s=>['heal','heal2','fire','fire2'].includes(s.id));
  if(!sp.length){ showMsg('まだ じゅもんを つかえない！',()=>battleCommand()); return; }
  showChoice(sp.map(s=>s.name+' ('+s.mp+')').concat(['やめる']),sel=>{
    if(sel<0||sel===sp.length){ battleCommand(); return; }
    const s=sp[sel];
    if(G.mp<s.mp){ showMsg('MPが たりない！',()=>battleCommand()); return; }
    G.mp-=s.mp;
    if(s.id==='heal'||s.id==='heal2'){
      sfx('heal');
      const v=s.id==='heal'?irnd(25,35):irnd(80,100);
      G.hp=Math.min(maxHP(),G.hp+v);
      showMsg('ゆうしゃは '+s.name+'を となえた！\nHPが '+v+' かいふくした。',()=>afterPlayerAction());
    } else {
      sfx('spell');
      let v=s.id==='fire'?irnd(16,28):irnd(50,70);
      B.hp-=v; B.flash=10;
      showMsg('ゆうしゃは '+s.name+'を となえた！\n'+B.name+'に '+v+'の ダメージ！',()=>afterPlayerAction());
    }
  },{title:'じゅもん',x:20,y:130,w:200});
}
function battleItem(){
  const ks=Object.keys(G.items).filter(k=>G.items[k]>0&&(k==='herb'||k==='elixir'));
  if(!ks.length){ showMsg('つかえる どうぐが ない！',()=>battleCommand()); return; }
  showChoice(ks.map(k=>ITEMS[k].name+' x'+G.items[k]).concat(['やめる']),sel=>{
    if(sel<0||sel===ks.length){ battleCommand(); return; }
    const k=ks[sel];
    G.items[k]--; sfx('heal');
    if(k==='herb'){
      const v=irnd(25,35); G.hp=Math.min(maxHP(),G.hp+v);
      showMsg('やくそうを つかった！\nHPが '+v+' かいふくした。',()=>afterPlayerAction());
    } else {
      G.hp=maxHP();
      showMsg('いのちのみずを のんだ！\nHPが かんぜんに かいふくした！',()=>afterPlayerAction());
    }
  },{title:'どうぐ',x:20,y:160,w:230});
}
function tryRun(){
  if(B.boss){ showMsg('しかし てきに ゆくてを ふさがれた！',()=>enemyTurn()); return; }
  if(Math.random()*agi() >= Math.random()*B.agi*0.8){
    sfx('cursor');
    showMsg('ゆうしゃは にげだした！',()=>endBattle(false));
  } else {
    showMsg('しかし てきに ゆくてを ふさがれた！',()=>enemyTurn());
  }
}
function afterPlayerAction(){
  if(B.hp<=0){ enemyDefeated(); return; }
  enemyTurn();
}
function enemyTurn(){
  // 行動選択
  let act='attack';
  if(B.spell==='heal' && B.hp<MONSTERS[B.key].hp/3 && Math.random()<0.5) act='heal';
  else if(B.spell==='fire' && Math.random()<0.35) act='fire';
  else if(B.spell==='fire2' && Math.random()<0.45) act='fire2';
  if(act==='attack'){
    sfx('hit');
    const d=dmgCalc(B.atk,dfn());
    G.hp-=d; flashTimer=8; if(d>0) battleShake=12;
    showMsg([B.name+'の こうげき！',d>0?'ゆうしゃは '+d+'の ダメージを うけた！':'ミス！ ゆうしゃは ひらりと かわした！'],()=>afterEnemyAction());
  } else if(act==='heal'){
    sfx('heal');
    const v=irnd(20,40); B.hp=Math.min(MONSTERS[B.key].hp,B.hp+v);
    showMsg(B.name+'は きずを いやした！',()=>afterEnemyAction());
  } else {
    sfx('spell');
    const v=act==='fire'?irnd(10,20):irnd(30,45);
    G.hp-=v; flashTimer=8; battleShake=12;
    showMsg([B.name+'は ほのおを はいた！','ゆうしゃは '+v+'の ダメージを うけた！'],()=>afterEnemyAction());
  }
}
function afterEnemyAction(){
  if(G.hp<=0){ G.hp=0; playerDead(); return; }
  battleCommand();
}
function enemyDefeated(){
  B.dead=true;
  if(B.key==='boss1'){
    stopMusic(); sfx('spell');
    showMsg(['まおうガルドを うちたおした！','…と おもったその とき！','ガルド「ぐぬぬ… よくも わしの\nかりのすがたを…！','これが わしの しんの ちからだ！！」'],()=>{
      startBattle('boss2');
    });
    return;
  }
  if(B.key==='boss2'){
    G.flags.cleared=true;
    stopMusic(); sfx('win');
    showMsg(['しんのガルドを うちたおした！','せかいに ひかりが もどっていく…'],()=>{
      startEnding();
    });
    return;
  }
  sfx('win');
  if(B.winFlag) G.flags[B.winFlag]=true;
  const lines=[B.name+'を たおした！','けいけんち '+B.exp+'  '+B.gold+'ゴールドを かくとく！'];
  G.exp+=B.exp; G.gold+=B.gold;
  // レベルアップ判定
  const ups=[];
  while(G.lv<20 && G.exp>=LV_EXP[G.lv]){
    G.lv++;
    ups.push('レベルが '+G.lv+'に あがった！');
    const learned=SPELLS.filter(s=>s.lv===G.lv);
    learned.forEach(s=>ups.push('じゅもん「'+s.name+'」を おぼえた！'));
    G.hp=maxHP(); G.mp=maxMP(); // レベルアップで全回復（遊びやすさ重視）
  }
  if(ups.length){ sfx('levelup'); }
  showMsg(lines.concat(ups),()=>endBattle(true));
}
function endBattle(){
  B=null; mode='field';
  encGrace=4; // 戦闘直後は数歩ぶん エンカウントしない
  const m=curMap();
  if(m) playMusic(m.music);
  else playMusic(zoneAt(G.x,G.y)>=4?'island':(G.x>=29?'field2':'field'));
}
function playerDead(){
  stopMusic(); sfx('dead');
  showMsg(['ゆうしゃは ちからつきた…','いしきが とおく なっていく…'],()=>{
    G.gold=Math.floor(G.gold/2);
    G.hp=maxHP(); G.mp=maxMP();
    B=null; mode='field';
    enterMap('castle',8,9);
    showMsg('おう「なんと、たおれてしまったか…。\nだが あきらめるでないぞ。\nちりょうだいとして おかねを\nはんぶん もらっておく」');
  });
}

  }

  for(const [t,s] of msgs){
    if(endTimer>t){ ctx.fillStyle = s==='THE END'?'#fc6':'#fff';
      ctx.fillText(s,256,y); }
    y+=36;
  }
  if(endTimer>200){ drawArt('hero_d',200,40,3,false); drawArt('npc_princess',264,40,3,false); }
  if(endTimer>620){
    ctx.font="14px 'DotGothic16',monospace"; ctx.fillStyle='#888';
    ctx.fillText('Zキーで タイトルへ',256,430);
    if(keyPressed('z')||keyPressed('Enter')){ mode='title'; playMusic('title'); }
  }
  ctx.textAlign='left';
}

//==================================================================
//  メインループ
//==================================================================
function tick(){
  frame++;
  switch(mode){
    case 'title': titleUpdate(); titleDraw(); break;
    case 'field':
      fieldUpdate(); fieldDraw(); break;
    case 'battle':
      if(MSG) msgUpdate(); else if(CHOICE) choiceUpdate();
      battleDraw(); break;
    case 'ending': endingDraw(); break;
  }
  for(const k in pressed) pressed[k]=false;
  requestAnimationFrame(tick);
}
newGame();
// 最初のキー入力で音楽開始（自動再生制限対応）
let musicStarted=false;
window.addEventListener('keydown',()=>{ if(!musicStarted){ musicStarted=true; if(mode==='title') playMusic('title'); } });
window.addEventListener('touchstart',()=>{ if(!musicStarted){ musicStarted=true; audio(); if(mode==='title') playMusic('title'); } });
requestAnimationFrame(tick);
</script>
</body>
</html>
